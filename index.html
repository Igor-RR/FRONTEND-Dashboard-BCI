<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="icon" type="image/png" href="assets/signal-icon.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <section>
        <nav id="barra-navegacao">
            <div class="container-icon-texto">
                <img src="/assets/signal.webp">
                <a href="">Registros</a>
            </div>
            <div class="container-icon-texto">
                <img src="/assets/db-icon.webp">
                <a href="">Usuários cadastrados</a>
            </div>
            <div class="container-icon-texto">
                <img id='user-photo'src="/assets/user.png">
                <a href="">User</a>
            </div>
        </nav>
        <header id="header">
            <h1>Sistema de detecção de alpha blocking 🧠</h1>
        </header>
    </section>

    <main>
        <section id="container-geral">
            <div id="container-graficos">
                <div class="card">
                    <h2>Sinal Original</h2> 
                    <canvas id="grafico-sinal-ruidoso"></canvas>
                </div>

                <div class="card">
                        <h2>Frequências predominantes</h2>
                        <h3> 40 HZ</h3>
                    <canvas id="frequencias-sinal-ruidoso"></canvas>
                </div>

                <div class="card">
                    <h2>Sinal Filtrado</h2>
                    <h3> 40 HZ</h3>
                    <canvas id="frequencias-sinal-filtrado"></canvas>
                </div>

            </div>

            <div id="container-complementar">
                <div class="card-complementar">
                    <h3 id="status-olhos">ABERTOS</h3>
                    <h4>Status olhos</h4>
                </div>

                <div class="card-complementar">
                    <div id="cerebro-3d"></div>
                </div>

                <div class="card-complementar">
                    <h3>Iniciar Gravação</h3>
                    <button>Iniciar</button>
                </div>
            </div>
        </section>
    </main>
    <script src="graficos.js"></script>
    <script type="module" src="modelo.js"></script>
</body>
</html>
